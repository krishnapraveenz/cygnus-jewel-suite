name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Build backend binaries (Linux, Windows, macOS) ───────────────────
  backend:
    name: Backend (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: backend-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: backend-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: backend-macos-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build backend (release)
        run: cargo build -p backend --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/backend${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  # ─── Build desktop app (Tauri bundles) ────────────────────────────────
  desktop:
    name: Desktop (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bundle: deb,appimage
          - os: windows-latest
            bundle: nsis
          - os: macos-latest
            bundle: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build Tauri bundle
        working-directory: apps/desktop
        run: pnpm tauri build --bundles ${{ matrix.bundle }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/release/bundle/**/*.msi

  # ─── Create GitHub Release with all artifacts ─────────────────────────
  release:
    name: Create Release
    needs: [backend, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Display artifacts
        run: find artifacts/ -type f | head -30
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
