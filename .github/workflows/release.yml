name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Build backend binaries (Linux, Windows, macOS) ───────────────────
  backend:
    name: Backend (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: backend-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: backend-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: backend-macos-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build backend (release)
        run: cargo build -p backend --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/backend${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  # ─── Build desktop app with Tauri (signed + updater JSON) ─────────────
  desktop:
    name: Desktop (${{ matrix.settings.os }})
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            args: ""
          - os: windows-latest
            args: ""
          - os: macos-latest
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.settings.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Install Linux deps
        if: matrix.settings.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app (signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: "Cygnus Jewel Suite v__VERSION__"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.settings.args }}

  # ─── Attach backend binaries to the same GitHub Release ───────────────
  attach-backend:
    name: Attach backend to release
    needs: [backend, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          path: backend-artifacts/
          pattern: backend-*

      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Upload backend binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            backend-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
